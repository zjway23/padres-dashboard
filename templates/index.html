<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Padres Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0d1f2d;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background-color: #1a3a4a;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            min-width: 300px;
        }
        h1 { color: #ffc425; }
        .score {
            font-size: 48px;
            font-weight: bold;
            margin: 20px 0;
        }
        .status {
            color: #aaa;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>⚾ Padres Dashboard</h1>
        {% if game %}
            <p>{{ game.away }} @ {{ game.home }}</p>
            <div class="score">{{ game.away_score }} - {{ game.home_score }}</div>
            <p class="status">{{ game.status }} · {{ game.date }}</p>
        {% else %}
            <p>No game today.</p>
        {% endif %}
    </div>
</body>
</html>
